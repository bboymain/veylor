name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - stage-8-database-foundation

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint 2>&1 | tee lint-output.txt

      - name: Upload lint output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-output
          path: lint-output.txt

      - name: Test
        run: bun run test 2>&1 | tee test-output.txt

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt

      - name: Production build
        run: bun run build
